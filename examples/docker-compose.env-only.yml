# Minimal setup — no config file needed
# Just pass repos as comma-separated list

services:
  repo-sync:
    image: ghcr.io/harryy2510/repo-sync:latest
    container_name: repo-sync
    restart: unless-stopped
    volumes:
      - /home/ubuntu/workspace:/workspace
      - /root/.ssh:/root/.ssh:ro
    environment:
      # Comma-separated org/repo list — auto-builds paths
      REPOS: "acme-corp/frontend,acme-corp/backend-api,acme-corp/shared-libs"
      REPOS_BASE_URL: "git@github.com:"
      DEFAULT_REF: "main"
      WORKSPACE: /workspace
      SYNC_INTERVAL: "120"
      HEALTH_PORT: "8080"
      LOG_LEVEL: info
      SSH_KEY_FILE: /root/.ssh/id_ed25519
      GIT_USER_NAME: "Your Name"
      GIT_USER_EMAIL: "you@example.com"
